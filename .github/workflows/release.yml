name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore Jellyfin.Plugin.Subdivx.sln
      - name: Publish
        run: dotnet publish Jellyfin.Plugin.Subdivx/Jellyfin.Plugin.Subdivx.csproj -c Release -o artifacts/publish
      - name: Prepare package
        run: |
          mkdir -p artifacts/package/Jellyfin.Plugin.Subdivx
          cp -R artifacts/publish/* artifacts/package/Jellyfin.Plugin.Subdivx/
          cd artifacts/package
          zip -r ../../Jellyfin.Plugin.Subdivx-${GITHUB_REF_NAME}.zip Jellyfin.Plugin.Subdivx
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.Subdivx-${{ github.ref_name }}.zip
